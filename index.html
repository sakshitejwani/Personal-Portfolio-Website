<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Favicon — the small icon in the browser tab.
      Replace /favicon.ico with your own icon file
      placed in the /public folder.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- Makes the site look correct on mobile screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tab title — what appears in the browser tab -->
    <title>Sakshi Tejwani — Software Developer</title>

    <!-- SEO description — shown in Google search results -->
    <meta
      name="description"
      content="Sakshi Tejwani — MS Computer Science at CSULB. Backend engineer specializing in Java, Spring Boot, and microservices."
    />
  </head>
  <body>

    <!--
      React mounts your entire app into this div.
      You don't need to put anything else here.
    -->
    <div id="root"></div>

    <!--
      This script tag loads your React app.
      Vite handles this automatically.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
